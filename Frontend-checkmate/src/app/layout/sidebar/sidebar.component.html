<div class="sidebar">
  <ul class="menu">
    <li
      *ngFor="let item of visibleMenuItems"
      [routerLink]="item.route"
      routerLinkActive="active"
    >
      <span class="material-icons icon">{{ item.icon }}</span>
      <span class="menu-text">{{ item.label }}</span>
    </li>
  </ul>

  <ul class="menu logout-section">
    <li (click)="onLogout()">
      <span class="material-icons icon">logout</span>
      <span class="menu-text">Logout</span>
    </li>
  </ul>
</div>
