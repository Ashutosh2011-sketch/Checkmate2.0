<div class="dashboard-grid" *ngIf="dashboard">

  <!-- ================= ASSIGNED CHECKLISTS ================= -->
  <div class="card large">
    <h3>Assigned Checklists</h3>

    <div *ngIf="dashboard.assignedChecklists?.length === 0">
      No checklists assigned
    </div>

    <div class="checklist-item"
         *ngFor="let checklist of dashboard.assignedChecklists">

      <div class="left">
        <div class="circle-avatar">
    {{ checklist.charAt(0) }}
      </div>
        <div>
          <strong>{{ checklist }}</strong>
          <div class="badge high">Active</div>
        </div>
      </div>

      <div class="right">
        <span class="badge high">In Progress</span>

        <div class="progress-bar">
          <div class="progress-fill"
               [style.width.%]="dashboard.progress || 0">
          </div>
        </div>
      </div>

    </div>
  </div>


  <!-- ================= OVERALL PROGRESS ================= -->
  <div class="card progress-card">
    <h3>Overall Progress</h3>

    <div class="circle-wrap">
      <div class="circle">
        <span>{{ dashboard.progress || 0 }}%</span>
        <small>Complete</small>
      </div>
    </div>
  </div>


  <!-- ================= CLAIMED TASKS ================= -->
  <div class="card">
    <h3>Claimed Tasks</h3>

    <div *ngIf="dashboard.claimedTasks?.length === 0">
      No claimed tasks
    </div>

    <div class="task-box"
         *ngFor="let task of dashboard.claimedTasks">

      <div class="task-row">
        <span>{{ task }}</span>
        <span class="status-text">In Progress</span>
      </div>

    </div>

    <div class="btn-wrapper">
      <button class="btn-primary">Claim Task</button>
    </div>
  </div>


  <!-- ================= NOTIFICATIONS ================= -->
  <div class="card">
    <h3>Notifications</h3>

    <div *ngIf="dashboard.notifications?.length === 0">
      No notifications
    </div>

    <div class="notification"
         *ngFor="let note of dashboard.notifications">
      {{ note }}
    </div>
  </div>

</div>


<!-- ================= LOADING STATE ================= -->
<div *ngIf="!dashboard" class="loading">
  Loading dashboard...
</div>
