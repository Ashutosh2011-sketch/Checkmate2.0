<div class="page">

<h1>Checklist Tracker</h1>

<input placeholder="Search checklist" [(ngModel)]="searchText">

<div class="card-container">

<div *ngFor="let checklist of checklists" class="card">

<h3>{{checklist.name}}</h3>
<p><b>Department:</b> {{checklist.department}}</p>

<div class="progress-bar">
<div class="progress-fill"
[style.width.%]="getProgress(checklist)">
</div>
</div>

<p>{{getProgress(checklist)}}% Complete</p>

<span class="status">{{getStatus(checklist)}}</span>

<hr>

<div *ngFor="let task of checklist.tasks">

<label>

<input type="checkbox"
[checked]="task.completed"
(change)="toggleTask(checklist,task)">

{{task.title}}

</label>

<p>Priority: {{task.priority}}</p>
<p>Deadline: {{task.deadline}}</p>
<p>Assigned To: {{task.assignedTo || 'Unassigned'}}</p>

<button *ngIf="!task.assignedTo"
(click)="claimTask(task)">
Claim Task
</button>

<div>

<input #comment placeholder="Comment">
<button (click)="addComment(task,comment.value); comment.value=''">
Add Comment
</button>

</div>

<ul>

<li *ngFor="let c of task.comments">{{c}}</li>

</ul>

<div>

<input #file placeholder="Attachment name">
<button (click)="addAttachment(task,file.value); file.value=''">
Attach
</button>

</div>

<ul>

<li *ngFor="let a of task.attachments">{{a}}</li>

</ul>

<hr>

</div>

<div *ngIf="checklist.activityLog.length>0">

<h4>Activity Log</h4>

<ul>
<li *ngFor="let log of checklist.activityLog">{{log}}</li>
</ul>

</div>

</div>

</div>

</div>
