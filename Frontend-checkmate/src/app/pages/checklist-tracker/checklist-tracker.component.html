<div class="page">

<h1>Checklist Tracker</h1>

<div class="card-container">

<div *ngFor="let checklist of checklists" class="card">

<h3>{{checklist.name}}</h3>
<p><b>Department:</b> {{checklist.department}}</p>

<div class="progress-bar">
  <div class="progress-fill"
       [style.width.%]="getProgress(checklist)">
  </div>
</div>

<p>{{getProgress(checklist)}}% Complete</p>
<span class="status">{{getStatus(checklist)}}</span>

<hr>

<!-- 🔥 ORDERED TASK FLOW -->
<div *ngFor="let task of getOrderedTasks(checklist)"
     class="task"
     [class.locked]="isTaskLocked(task, checklist)">

<label class="task-row">

<input type="checkbox"
       [checked]="task.completed"
       (change)="toggleTask(checklist, task)"
       [disabled]="isTaskLocked(task, checklist)">

<span class="task-title">{{task.title}}</span>

</label>

<div class="meta">

<span class="priority {{task.priority.toLowerCase()}}">
  {{task.priority}}
</span>

<span class="user">
  👤 {{task.assignedTo || 'Unassigned'}}
</span>

</div>

</div>

</div>

</div>
</div>
