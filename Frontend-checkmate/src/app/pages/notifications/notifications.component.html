
<div class="notifications-page">

  <div class="notifications-header">
    <h2>🔔 Notifications</h2>
    <span class="notif-count" *ngIf="notificationsList.length > 0">
      {{ notificationsList.length }} unread
    </span>
  </div>

  <!-- Loading state -->
  <div class="loading-state" *ngIf="loading">
    <p>Loading notifications...</p>
  </div>

  <!-- Notifications list -->
  <div class="notifications-grid" *ngIf="!loading && notificationsList.length > 0">
    <div class="notif-card" *ngFor="let notif of notificationsList"
         [class.task-complete]="notif.type === 'TASK_COMPLETE'"
         [class.checklist-complete]="notif.type === 'CHECKLIST_COMPLETE'">

      <div class="card-top">
        <span class="notif-icon">{{ getIcon(notif.type) }}</span>
        <div class="notif-content">
          <p class="notif-message">{{ notif.message }}</p>
          <span class="notif-time">{{ getTimeAgo(notif.createdAt) }}</span>
        </div>
        <button class="dismiss-btn" (click)="markOneAsRead(notif.id)" title="Dismiss">✕</button>
      </div>

    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!loading && notificationsList.length === 0">
    <div class="empty-icon">🎉</div>
    <h3>All caught up!</h3>
    <p>No new notifications from users.</p>
  </div>

  <!-- Mark all read -->
  <div class="action-row" *ngIf="!loading && notificationsList.length > 0">
    <button class="mark-read-btn" (click)="markAllAsRead()">Mark All as Read</button>
  </div>

</div>
