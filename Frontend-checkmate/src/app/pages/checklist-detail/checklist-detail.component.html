<div class="container">

  <!-- HEADER -->
  <div class="top-bar">
    <div>
      <h2>Checklist Detail</h2>
      <span class="sub">ID: {{ checklistId }}</span>
    </div>

    <input
      class="search"
      placeholder="Search tasks..."
      [(ngModel)]="searchText"
      (input)="applyFilters()" />
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrapper">
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>
    <span>{{ progress }}% Completed</span>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div>
      <span>Status:</span>
      <button *ngFor="let f of statusFilters"
        [class.active]="activeStatus === f"
        (click)="setStatusFilter(f)">
        {{ f }}
      </button>
    </div>

    <div>
      <span>Priority:</span>
      <button *ngFor="let f of priorityFilters"
        [class.active]="activePriority === f"
        (click)="setPriorityFilter(f)">
        {{ f }}
      </button>
    </div>
  </div>

  <!-- EMPTY -->
  <div *ngIf="groupedTasks.length === 0" class="empty">
    No tasks found
  </div>

  <!-- SECTIONS -->
  <div *ngFor="let section of groupedTasks" class="section">

    <div class="section-header" (click)="toggleSection(section)">
      {{ section.key }}
      <span class="count">{{ section.value.length }}</span>
    </div>

    <div *ngIf="section.expanded">

      <div *ngFor="let task of section.value"
     class="task-card"
     [class.locked]="isTaskLocked(task)">

  <div class="left">
    <h4>{{ task.title }}</h4>
    <p>{{ task.description }}</p>

    <div class="meta">
      <span>👤 {{ task.assignees?.join(', ') }}</span>
      <span>⏱ {{ formatDays(task.dueDateDays) }}</span>
    </div>
  </div>

  <div class="right">
    <span class="badge" [ngClass]="getPriorityClass(task.priority)">
      {{ task.priority }}
    </span>

    <span class="badge" [ngClass]="getStatusClass(task.status)">
      {{ task.status }}
    </span>
  </div>

</div>

    </div>

  </div>

</div>
