# 1. Database Connection URL (Check database name 'checkmate_db')
spring.datasource.url=jdbc:mysql://localhost:3306/checkmate_db?createDatabaseIfNotExist=true

# 2. MySQL Username and Password (Zaroori: Check karein password sahi hai ya nahi)
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD

# # 3. Driver Class (Taki Hibernate ko rasta mile)
