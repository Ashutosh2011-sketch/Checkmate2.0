# ============================================================
# Server — Render injects PORT automatically
# ============================================================
server.port=${PORT:8080}

# ============================================================
# PostgreSQL — Set SPRING_DATASOURCE_URL (full URL with
# ?sslmode=require), SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD in Render Environment Variables
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JPA / Flyway
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# SendGrid — Set SENDGRID_API_KEY, SENDGRID_FROM_EMAIL,
# SENDGRID_FROM_NAME in Render Environment Variables
# ============================================================
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}
sendgrid.from.name=${SENDGRID_FROM_NAME:Checkmate}

# ============================================================
# CORS — Set FRONTEND_URL in Render Environment Variables
# ============================================================
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:4200}
